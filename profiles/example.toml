# JobScouting profile template. Copy to profiles/<yourname>.toml and fill in.
# Run with:  python main.py --profile profiles/<yourname>.toml
#
# Everything in here is yours and customizable: profile, rubric, weights,
# keywords, sources. The code does not need to be touched.
#
# TOML note: top-level keys (profile_text, scoring_rubric, keywords, ...) MUST
# come BEFORE any [table]. Tables ([meta], [weights], [[sources]]) go last.

# Free-form description of yourself: role, experience, skills, domain, location
# and preferences (remote/on-site, acceptable cities, personal red flags). The
# richer and more specific, the better the scoring.
profile_text = """
Candidate profile: <who you are>.

Current role: <role, company, since when, work mode>.
Skills: <main stack/domain>.
Experience: <years and level: junior/mid/senior>.
Education: <degrees>.
Languages: <languages>.

Location and preferences:
- Lives in <city>.
- Ideal: <full remote / on-site nearby / acceptable cities>.
- Personal red flags: <what you do NOT want>.
"""

# scoring_rubric is OPTIONAL: by default it is auto-built from the active factors
# in [weights] (see config.FACTORS), so it always matches your selection. Only
# uncomment and set it if you want to fully override the model instructions, and
# then keep it in sync with your factors (do NOT put the weight numbers here).
# scoring_rubric = """
# Score every offer with the sub-scores below 0-100. Do NOT compute the total.
# 1) skill_fit - fit with the candidate's role, skills and domain.
# ... one line per factor you listed in [weights] ...
# """

# Domain keywords: combined into a broad OR in the Adzuna query.
keywords = [
    "<keyword 1>",
    "<keyword 2>",
]

# Extra (broader) keywords, used only on sources with extra_keywords = true.
remote_extra_keywords = [
    "<broad keyword 1>",
]

# Text forced as AND on remote sources (e.g. "remote"). Remove to disable.
remote_query_what = "remote"

[meta]
name = "First Last"
report_language = "english"   # language of motivation/red flags/gap in the report
report_top_n = 15             # how many offers to show in the report

# Scoring factors and their relative weights (auto-normalized, no need to sum
# to 1.0). Pick the factors that matter for your search; 4-6 active works best.
# Catalog (see config.FACTORS): skill_fit, salary_seniority, company, location,
# culture_values, growth, work_life, contract, industry, mission, sustainability,
# benefits, stability.
[weights]
skill_fit = 0.45
salary_seniority = 0.20
company = 0.15
location = 0.20
# growth = 0.10        # example: uncomment to add another factor


# --- Adzuna sources ---
# Adzuna country codes: at au be br ca ch de es fr gb in it mx nl nz pl sg us za
# where/distance: geographic anchor (omit for a nationwide search).
# remote_filter = true: keep only ads with a remote term (config.REMOTE_TERMS).
# extra_keywords = true: adds remote_extra_keywords to the OR query.

[[sources]]
name = "near_home"
country = "gb"
where = "<your city>"
distance = 50
remote_filter = false

[[sources]]
name = "remote_gb"
country = "gb"
remote_filter = true
extra_keywords = true

[[sources]]
name = "remote_de"
country = "de"
remote_filter = true
extra_keywords = true
